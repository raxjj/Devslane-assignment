<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>404 Not Found</h1>
        <img src="404-logo.png" alt="404 Not Found Logo" class="logo">
        
        <div class="upload-container">
            <label for="file-upload" class="upload-label">Upload the sample</label>
            <input type="file" id="file-upload" accept="image/*,video/*" onchange="toggleAnalyzeButton()">
            <button id="analyze-button" disabled>Analyze</button>
        </div>
    </div>

    <script>
        function toggleAnalyzeButton() {
            const fileInput = document.getElementById('file-upload');
            const analyzeButton = document.getElementById('analyze-button');
            analyzeButton.disabled = !fileInput.files.length;
        }
    </script>
</body>
</html>
